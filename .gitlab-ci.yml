# Minimal pipeline - Frontend API tests only (all steps optional)
#TESTING STAGE ONLY
# example: frotnend
# TODO: Set desired steps as variables when triggering pipeline
# Example: SKIP_DEPLOY_KEYCLOAK=true SKIP_DEPLOY_MINIO=true SKIP_DEPLOY_DCACHE=true SKIP_TESTS=true

stages:
  - test

variables:
  K8S_NAMESPACE: dcb-$CI_PIPELINE_ID
  DCACHE_COMPATIBILITY_VERSION: "9.2.40"

  # Optional step flags (set to "true" to skip, "false" to run)
  SKIP_DEPLOY_KEYCLOAK: "false"
  SKIP_DEPLOY_MINIO: "false"
  SKIP_DEPLOY_DCACHE: "false"
  SKIP_TESTS: "false"

default:
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure

.kubernetes_tags:
  tags:
    - kubernetes
    - dcache-dev
  dependencies: []

.kubernetes_image:
  extends: .kubernetes_tags
  image: dtzar/helm-kubectl:latest

.helm_image:
  extends: .kubernetes_tags
  image:
    name: dtzar/helm-kubectl:latest
    entrypoint: ['']

before_script:
  - kubectl create namespace ${K8S_NAMESPACE}

after_script:
  - kubectl delete namespace ${K8S_NAMESPACE} --grace-period=1 --ignore-not-found=true

# Deploy Keycloak
Deploy Keycloak:
  stage: test
  extends: .kubernetes_image
  script:
    - kubectl -n $K8S_NAMESPACE apply -f .ci/keycloack-deployment.yaml
  rules:
    - if: $SKIP_DEPLOY_KEYCLOAK != "true"

# Deploy MinIO
Deploy MinIO (HSM):
  stage: test
  extends: .helm_image
  script:
    - helm repo add minio https://charts.min.io/
    - helm repo update
    - helm -n ${K8S_NAMESPACE} upgrade --install --wait --replace --timeout 10m0s --set-string rootUser=dcache --set-string rootPassword=let-me-in --set replicas=1 --set persistence.enabled=false --set mode=standalone --set buckets[0].name=hsm,buckets[0].policy=none tape minio/minio
  rules:
    - if: $SKIP_DEPLOY_MINIO != "true"

# Deploy dCache
Deploy dCache:
  stage: test
  extends: .helm_image
  needs:
    - Deploy Keycloak
    - Deploy MinIO (HSM)
  script:
    - helm repo add dcache https://gitlab.desy.de/api/v4/projects/7648/packages/helm/test
    - helm repo update
    - helm -n ${K8S_NAMESPACE} upgrade --install --wait --replace --timeout 10m0s --set image.tag=${DCACHE_COMPATIBILITY_VERSION} --set dcache.hsm.enabled=true --set dcache.qos.enabled=true --set services.srm.enabled=false --set image.registry=${CI_REGISTRY} --values .ci/custom-helm-config.yaml dcache dcache/dcache
  rules:
    - if: $SKIP_DEPLOY_DCACHE != "true"

# Frontend API Tests
Frontend API Tests:
  stage: test
  extends: .kubernetes_image
  needs:
    - Deploy dCache
  script:
    - kubectl -n $K8S_NAMESPACE apply -f .ci/frontend.yaml
    - while ! kubectl -n $K8S_NAMESPACE wait --for=condition=Ready pod http-tester; do sleep 1; done
    - kubectl -n $K8S_NAMESPACE cp .ci/poolEndpoint.http http-tester:/poolEndpoint.http
    - kubectl -n $K8S_NAMESPACE cp .ci/qosEndpoint.http http-tester:/qosEndpoint.http
    - kubectl -n $K8S_NAMESPACE cp .ci/qosPolicyEndpoint.http http-tester:/qosPolicyEndpoint.http
    - kubectl -n $K8S_NAMESPACE cp .ci/migrationEndpoint.http http-tester:/migrationEndpoint.http
    - kubectl -n $K8S_NAMESPACE cp .ci/userEndpoint.http http-tester:/userEndpoint.http
    - kubectl -n $K8S_NAMESPACE cp .ci/bulkRequestsEndpoint.http http-tester:/bulkRequestsEndpoint.http
    - kubectl -n $K8S_NAMESPACE cp .ci/spacemanagerEndpoint.http http-tester:/spacemanagerEndpoint.http
    - kubectl -n $K8S_NAMESPACE cp README.md http-tester:/README.md
    - kubectl -n $K8S_NAMESPACE cp http-client.private.env.json http-tester:/http-client.private.env.json
    - kubectl -n $K8S_NAMESPACE exec http-tester -- java --add-opens=java.base/java.util=ALL-UNNAMED $IJHTTP_JAVA_OPTS -cp /intellij-http-client/* com.intellij.httpClient.cli.HttpClientMain -e Test -D /poolEndpoint.http /qosEndpoint.http /qosPolicyEndpoint.http /migrationEndpoint.http /userEndpoint.http /bulkRequestsEndpoint.http /spacemanagerEndpoint.http -p /http-client.private.env.json --insecure --report=/httpTests
    - kubectl -n $K8S_NAMESPACE cp http-tester:/httpTests/report.xml report.xml
  artifacts:
    reports:
      junit:
        - "report.xml"
  rules:
    - if: $SKIP_TESTS != "true"
      when: always
